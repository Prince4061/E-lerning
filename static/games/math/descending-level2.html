<!DOCTYPE html>
<html lang="en">

<head>
    <script id="game-metadata" type="application/json">
    {
      "game_id": "math-descending-v4",
      "title": "Balloon Order Challenge",
      "subject": "math",
      "level": 2,
      "concept": "Ascending/Descending",
      "pass_threshold": 70,
      "min_age": 6
    }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Balloon Order Challenge - Timer Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --sky-blue: #87CEEB;
            --cloud-white: #f0f9ff;
        }

        body {
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            background: var(--sky-blue);
            user-select: none;
            touch-action: manipulation;
        }

        .fredoka {
            font-family: 'Fredoka One', cursive;
        }

        .balloon {
            position: absolute;
            cursor: pointer;
            z-index: 10;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.15));
            transition: transform 0.1s ease;
            will-change: transform;
        }

        .balloon-body {
            width: 75px;
            height: 95px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 1.6rem;
            position: relative;
            box-shadow: inset -8px -8px 15px rgba(0, 0, 0, 0.1);
        }

        .balloon-body::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 12px solid currentColor;
        }

        .balloon-string {
            position: absolute;
            bottom: -40px;
            left: 50%;
            width: 2px;
            height: 45px;
            background: rgba(255, 255, 255, 0.5);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(-10px, 0);
            }

            75% {
                transform: translate(10px, 0);
            }
        }

        .shake-anim {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes pop {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .pop-anim {
            animation: pop 0.3s ease-out forwards;
            pointer-events: none;
        }

        .ui-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 4px solid rgba(0, 0, 0, 0.05);
            z-index: 100;
        }
    </style>
</head>

<body class="h-screen flex flex-col">
    <header class="ui-panel p-4 flex justify-between items-center relative">
        <div class="flex gap-4">
            <div class="flex flex-col">
                <span class="text-[10px] uppercase font-bold text-blue-500">Score</span>
                <span id="score" class="text-2xl font-black text-blue-700 leading-none">0</span>
            </div>
            <div class="flex flex-col border-l pl-4 border-gray-200">
                <span class="text-[10px] uppercase font-bold text-orange-500">Time</span>
                <span id="timer" class="text-2xl font-black text-orange-600 leading-none">60</span>
            </div>
        </div>

        <div id="order-indicator"
            class="px-6 py-2 bg-white rounded-full border-2 border-blue-400 shadow-sm flex flex-col items-center">
            <span class="text-[9px] font-bold text-gray-400 uppercase leading-none">Order Goal</span>
            <span id="order-type" class="fredoka text-xl text-blue-600 tracking-wider leading-tight">ASCENDING</span>
        </div>

        <div class="flex flex-col items-end">
            <span class="text-[10px] uppercase font-bold text-red-400 tracking-tighter">Life</span>
            <div id="hearts" class="flex gap-1 text-2xl leading-none">❤️❤️❤️</div>
        </div>
    </header>

    <main id="game-canvas" class="relative flex-grow overflow-hidden cursor-crosshair">
        <!-- Floating background clouds -->
        <div class="absolute top-20 left-10 opacity-30 text-6xl">☁️</div>
        <div class="absolute top-40 right-20 opacity-30 text-8xl">☁️</div>
        <div class="absolute bottom-40 left-1/4 opacity-30 text-7xl">☁️</div>
    </main>

    <div id="overlay"
        class="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-sky-900/40 backdrop-blur-md transition-opacity duration-300">
        <div class="bg-white p-8 rounded-[40px] shadow-2xl text-center max-w-sm w-full border-b-8 border-gray-200">
            <div class="text-6xl mb-4 animate-bounce">🎈</div>
            <h2 id="overlay-title" class="fredoka text-4xl text-blue-600 mb-2">Balloon Pop!</h2>
            <p id="overlay-desc" class="text-gray-500 mb-8 font-bold leading-tight">Pop the balloons in order. You have
                60 seconds!</p>
            <button id="action-btn"
                class="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-2xl text-2xl fredoka shadow-[0_6px_0_#1d4ed8] active:shadow-none active:translate-y-1 transition-all">
                START GAME
            </button>
        </div>
    </div>

    <div id="toast"
        class="fixed bottom-12 left-1/2 -translate-x-1/2 px-8 py-3 rounded-full text-white font-black text-lg transform translate-y-20 opacity-0 transition-all duration-300 z-[250] pointer-events-none shadow-xl">
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const orderTypeEl = document.getElementById('order-type');
        const heartsEl = document.getElementById('hearts');
        const overlay = document.getElementById('overlay');
        const actionBtn = document.getElementById('action-btn');
        const toast = document.getElementById('toast');

        const BALLOON_COLORS = ['#FF5F5D', '#3F7CFF', '#49D49D', '#FFB347', '#A16AE8', '#FF69B4'];

        let state = {
            score: 0,
            lives: 3,
            gameActive: false,
            balloons: [],
            sequence: [],
            targetIndex: 0,
            order: 'ASCENDING',
            baseSpeed: 1.2,
            level: 1,
            isTransitioning: false,
            timeLeft: 60 // Changed from 3600 to 60
        };

        let gameTimer = null;

        const Sound = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(freq, type, duration, ramp = 0.01) {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(ramp, this.ctx.currentTime + duration);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + duration);
            },
            pop() { this.play(800, 'sine', 0.1); },
            wrong() { this.play(150, 'sawtooth', 0.3, 0.001); },
            win() {
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    setTimeout(() => this.play(f, 'sine', 0.2), i * 100);
                });
            }
        };

        function createLevel() {
            if (!state.gameActive) return;
            state.isTransitioning = true;

            // Decide order
            state.order = Math.random() > 0.5 ? 'ASCENDING' : 'DESCENDING';
            orderTypeEl.textContent = state.order;
            orderTypeEl.className = `fredoka text-xl tracking-wider ${state.order === 'ASCENDING' ? 'text-blue-600' : 'text-purple-600'}`;

            // Clear old balloons from array and DOM
            state.balloons.forEach(b => b.el.remove());
            state.balloons = [];

            // Generate unique numbers
            const balloonCount = Math.min(4 + Math.floor(state.level / 2), 7);
            let nums = [];
            while (nums.length < balloonCount) {
                let r = Math.floor(Math.random() * 90) + 10;
                if (!nums.includes(r)) nums.push(r);
            }

            const sorted = [...nums].sort((a, b) => a - b);
            state.sequence = state.order === 'ASCENDING' ? sorted : sorted.reverse();
            state.targetIndex = 0;

            // Spawn loop - ensure all balloons are created
            nums.forEach((val, i) => {
                setTimeout(() => {
                    if (state.gameActive) spawnBalloon(val);
                    if (i === nums.length - 1) state.isTransitioning = false;
                }, i * 300);
            });
        }

        function spawnBalloon(value) {
            const el = document.createElement('div');
            el.className = 'balloon';

            const color = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
            el.innerHTML = `
                <div class="balloon-body" style="background-color: ${color};">
                    ${value}
                    <div class="balloon-string"></div>
                </div>
            `;

            const startX = Math.random() * (canvas.clientWidth - 90) + 10;
            const startY = canvas.clientHeight + 100;
            el.style.left = `${startX}px`;
            el.style.top = `${startY}px`;

            canvas.appendChild(el);

            const bObj = {
                el,
                x: startX,
                y: startY,
                val: value,
                speed: (0.7 + Math.random() * 0.6) * state.baseSpeed,
                osc: Math.random() * 100,
                oscSpeed: 0.02 + Math.random() * 0.02
            };

            el.onpointerdown = (e) => {
                e.preventDefault();
                handlePop(bObj);
            };

            state.balloons.push(bObj);
        }

        function handlePop(balloon) {
            if (!state.gameActive || state.isTransitioning) return;

            if (balloon.val === state.sequence[state.targetIndex]) {
                Sound.pop();
                balloon.el.classList.add('pop-anim');
                state.score += 10;
                scoreEl.textContent = state.score;

                if (window.parent !== window) {
                    window.parent.postMessage({ type: 'gameScore', value: 10 }, '*');
                }

                state.balloons = state.balloons.filter(b => b !== balloon);
                setTimeout(() => balloon.el.remove(), 300);

                if (state.score > 70) {
                    Sound.win();
                    showToast("LEVEL COMPLETE! 🎉", "bg-green-500");
                    setTimeout(() => endGame("LEVEL COMPLETE!"), 500);
                    return;
                }

                state.targetIndex++;
                if (state.targetIndex >= state.sequence.length) {
                    Sound.win();
                    showToast("LEVEL UP! 🌟", "bg-green-500");
                    state.level++;
                    state.baseSpeed += 0.1;
                    setTimeout(createLevel, 1000);
                }
            } else {
                Sound.wrong();
                balloon.el.classList.add('shake-anim');
                setTimeout(() => balloon.el.classList.remove('shake-anim'), 400);

                state.lives--;
                updateHUD();
                showToast("WRONG ORDER! ❌", "bg-red-500");

                if (state.lives <= 0) endGame("GAME OVER!");
            }
        }

        function updateHUD() {
            heartsEl.innerHTML = '❤️'.repeat(Math.max(0, state.lives)) + '🖤'.repeat(Math.max(0, 3 - state.lives));

            // Simpler display for 60 seconds
            timerEl.textContent = state.timeLeft;

            if (state.timeLeft <= 0) {
                endGame("TIME'S UP!");
            }
        }

        function showToast(msg, color) {
            toast.textContent = msg;
            toast.className = `fixed bottom-12 left-1/2 -translate-x-1/2 px-8 py-3 rounded-full text-white font-black text-lg transform transition-all duration-300 z-[250] ${color} translate-y-0 opacity-100`;
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 1500);
        }

        function gameLoop() {
            if (!state.gameActive) return;

            const h = canvas.clientHeight;
            const w = canvas.clientWidth;

            for (let i = state.balloons.length - 1; i >= 0; i--) {
                const b = state.balloons[i];
                b.y -= b.speed;
                b.osc += b.oscSpeed;
                const sideX = Math.sin(b.osc) * 3;

                b.el.style.transform = `translate(${sideX}px, 0)`;
                b.el.style.top = `${b.y}px`;

                // Recirculate if missed
                if (b.y < -150) {
                    b.y = h + 120;
                    b.x = Math.random() * (w - 90) + 10;
                    b.el.style.left = `${b.x}px`;
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            Sound.init();
            clearInterval(gameTimer);

            state = {
                score: 0,
                lives: 3,
                gameActive: true,
                balloons: [],
                sequence: [],
                targetIndex: 0,
                order: 'ASCENDING',
                baseSpeed: 1.3,
                level: 1,
                isTransitioning: false,
                timeLeft: 60 // Reset to 60s
            };

            scoreEl.textContent = "0";
            updateHUD();
            overlay.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => overlay.classList.add('hidden'), 300);

            createLevel();
            gameLoop();

            gameTimer = setInterval(() => {
                if (state.gameActive) {
                    state.timeLeft--;
                    updateHUD();
                }
            }, 1000);
        }

        function endGame(title) {
            state.gameActive = false;
            clearInterval(gameTimer);

            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.remove('opacity-0', 'pointer-events-none'), 10);

            document.getElementById('overlay-title').textContent = title;
            document.getElementById('overlay-title').className = `fredoka text-4xl ${title.includes('OVER') ? 'text-red-600' : 'text-green-600'} mb-2`;
            document.getElementById('overlay-desc').innerHTML = `Final Score: <span class="text-3xl text-blue-600 block mt-2">${state.score}</span>`;
            
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'gameOver',
                    score: state.score,
                    livesLeft: state.lives,
                    levelReached: state.level
                }, '*');
            }

            actionBtn.textContent = title === "LEVEL COMPLETE!" ? "NEXT LEVEL" : "RESTART";

            state.balloons.forEach(b => b.el.remove());
            state.balloons = [];
        }

        actionBtn.onclick = startGame;

        window.onresize = () => {
            if (state.gameActive) {
                state.balloons.forEach(b => {
                    if (b.x > canvas.clientWidth - 90) {
                        b.x = canvas.clientWidth - 90;
                        b.el.style.left = `${b.x}px`;
                    }
                });
            }
        };
    </script>
</body>

</html>
