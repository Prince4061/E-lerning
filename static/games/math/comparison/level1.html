<!DOCTYPE html>
<html lang="en">

<head>
    <script id="game-metadata" type="application/json">
    {
      "game_id": "math-comparison-3",
      "title": "Hungry Croc Comparison",
      "subject": "math",
      "level": 1,
      "concept": "Comparison",
      "topic": "Comparison",
      "is_premium": false,
      "description": "Master comparison with Hungry Croc!",
      "instructions": "Select the correct sign (>, =, <) to feed the crocodile. Get 70% or more to pass!",
      "pass_threshold": 70,
      "min_age": 6
    }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swamp Comparison Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --swamp-water: #1a3644;
            --swamp-bottom: #0f1c24;
            --lily-green: #4ade80;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(to bottom, #2d5a27, var(--swamp-water), var(--swamp-bottom));
            margin: 0;
            overflow: hidden;
            height: 100vh;
            color: white;
        }

        .font-game {
            font-family: 'Fredoka+One', cursive;
        }

        .swamp-overlay {
            position: fixed;
            inset: 0;
            background-image: url('image_584337.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.2;
            /* Using the provided image as a faint texture/reference background */
            pointer-events: none;
            z-index: -1;
        }

        .spotlight {
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 120%;
            background: radial-gradient(ellipse at top, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 70%);
            pointer-events: none;
            z-index: 1;
        }

        .lily-pad {
            position: relative;
            width: 220px;
            height: 120px;
            background: radial-gradient(ellipse at center, #2d5a27 0%, #1e3a1a 100%);
            border-radius: 100% / 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .lily-pad::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            width: 2px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-50%);
        }

        .croc-transition {
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* Float animation */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        .btn-game {
            transition: all 0.2s;
            filter: drop-shadow(0 4px 0 #15803d);
        }

        .btn-game:active {
            transform: translateY(4px);
            filter: drop-shadow(0 0px 0 #15803d);
        }

        .shake {
            animation: shake 0.5s linear;
        }

        @keyframes shake {
            0% {
                transform: translate(1px, 1px) rotate(0deg);
            }

            20% {
                transform: translate(-3px, 0px) rotate(1deg);
            }

            40% {
                transform: translate(1px, -1px) rotate(-1deg);
            }

            60% {
                transform: translate(-3px, 1px) rotate(0deg);
            }

            80% {
                transform: translate(1px, 1px) rotate(1deg);
            }

            100% {
                transform: translate(0, 0) rotate(0deg);
            }
        }
    </style>
</head>

<body class="flex flex-col items-center">

    <div class="swamp-overlay"></div>
    <div class="spotlight"></div>

    <header class="relative z-20 w-full p-4 flex justify-between items-start max-w-4xl">
        <div class="bg-black/30 backdrop-blur-md p-3 rounded-2xl border border-white/20">
            <h1 class="text-3xl font-game text-green-400">Hungry Croc!</h1>
            <p class="text-xs uppercase tracking-widest font-bold text-white/70">Comparison Adventure</p>
        </div>
        <div class="flex gap-4">
            <div class="bg-yellow-500 p-2 px-6 rounded-full font-game text-xl text-yellow-900 shadow-lg">
                ★ <span id="score">0</span>
            </div>
            <div class="bg-blue-500 p-2 px-6 rounded-full font-game text-xl text-white shadow-lg">
                LVL <span id="level-display">1</span>
            </div>
        </div>
    </header>

    <main class="relative z-10 flex-1 w-full flex flex-col items-center justify-center -mt-12">

        <div class="flex flex-row items-center justify-center gap-4 md:gap-12 w-full max-w-5xl">
            <!-- Left Lily Pad -->
            <div id="lily-left" class="lily-pad animate-float" style="animation-delay: 0s">
                <span id="num-left" class="text-6xl md:text-8xl font-game text-yellow-300 drop-shadow-md">14</span>
            </div>

            <!-- Central Croc Container -->
            <div id="croc-zone" class="w-64 h-64 flex items-center justify-center relative">
                <div id="croc-svg-container" class="w-full h-full croc-transition">
                    <!-- The SVG will be injected here via JS to handle complex states -->
                </div>
                <!-- Splash Effect -->
                <div class="absolute bottom-4 left-1/2 -translate-x-1/2 w-48 h-8 bg-blue-400/20 rounded-full blur-xl">
                </div>
            </div>

            <!-- Right Lily Pad -->
            <div id="lily-right" class="lily-pad animate-float" style="animation-delay: 0.5s">
                <span id="num-right" class="text-6xl md:text-8xl font-game text-yellow-300 drop-shadow-md">15</span>
            </div>
        </div>

        <div class="mt-20 flex gap-6 z-30">
            <button onclick="checkAnswer('>')"
                class="btn-game w-24 h-24 bg-green-500 rounded-3xl border-4 border-green-300 text-5xl font-game flex items-center justify-center hover:bg-green-400">
                &gt;
            </button>
            <button onclick="checkAnswer('=')"
                class="btn-game w-24 h-24 bg-yellow-500 rounded-3xl border-4 border-yellow-200 text-5xl font-game flex items-center justify-center hover:bg-yellow-400">
                =
            </button>
            <button onclick="checkAnswer('<')"
                class="btn-game w-24 h-24 bg-blue-500 rounded-3xl border-4 border-blue-300 text-5xl font-game flex items-center justify-center hover:bg-blue-400">
                &lt;
            </button>
        </div>
    </main>

    <!-- Feedback Modal -->
    <div id="level-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 hidden">
        <div class="bg-white p-10 rounded-[3rem] border-8 border-yellow-400 text-center max-w-sm transform scale-0 transition-transform duration-500"
            id="modal-content">
            <h2 class="text-5xl font-game text-green-600 mb-4">CRUNCH! 🐊</h2>
            <p class="text-2xl font-bold text-gray-700 mb-8">You reached Level <span id="new-level-val">2</span>!</p>
            <button onclick="closeModal()"
                class="w-full bg-green-600 text-white text-2xl font-game py-5 rounded-2xl shadow-xl hover:bg-green-700 active:scale-95 transition-all">
                KEEP EATING!
            </button>
        </div>
    </div>

    <script>
        let score = 0;
        let level = 1;
        let lives = 3;
        let num1, num2;
        let canPlay = true;
        const synth = new Tone.PolySynth(Tone.Synth).toDestination();

        // SVG Templates for different states matching image_584337.jpg
        const SVGS = {
            IDLE: `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" class="w-full h-full">
                    <path d="M40,140 Q100,160 160,140 Q160,100 130,80 Q100,70 70,80 Q40,100 40,140" fill="#22c55e" />
                    <circle cx="80" cy="80" r="15" fill="#22c55e" />
                    <circle cx="120" cy="80" r="15" fill="#22c55e" />
                    <circle cx="80" cy="80" r="8" fill="white" />
                    <circle cx="120" cy="80" r="8" fill="white" />
                    <circle cx="82" cy="80" r="3" fill="black" />
                    <circle cx="118" cy="80" r="3" fill="black" />
                    <path d="M70,120 Q100,130 130,120" stroke="#064e3b" stroke-width="6" fill="none" stroke-linecap="round" />
                </svg>
            `,
            GREATER: `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" class="w-full h-full">
                    <path d="M160,140 Q160,100 130,80 Q100,70 70,80" fill="#22c55e" />
                    <g transform="scale(-1, 1) translate(-200, 0)">
                        <path d="M40,120 L160,80 L160,120 Z" fill="#22c55e" />
                        <path d="M40,130 L160,170 L160,130 Z" fill="#16a34a" />
                        <path d="M100,100 L110,90 M120,95 L130,85" stroke="white" stroke-width="4" />
                        <path d="M100,150 L110,160 M120,155 L130,165" stroke="white" stroke-width="4" />
                        <path d="M70,125 Q110,125 150,110 L150,140 Q110,125 70,125" fill="#f472b6" />
                    </g>
                    <circle cx="120" cy="70" r="18" fill="#22c55e" />
                    <circle cx="120" cy="70" r="9" fill="white" />
                    <circle cx="115" cy="70" r="4" fill="black" />
                </svg>
            `,
            LESS: `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" class="w-full h-full">
                    <path d="M40,140 Q40,100 70,80 Q100,70 130,80" fill="#22c55e" />
                    <path d="M160,120 L40,80 L40,120 Z" fill="#22c55e" />
                    <path d="M160,130 L40,170 L40,130 Z" fill="#16a34a" />
                    <path d="M100,100 L90,90 M80,95 L70,85" stroke="white" stroke-width="4" />
                    <path d="M100,150 L90,160 M80,155 L70,165" stroke="white" stroke-width="4" />
                    <path d="M130,125 Q90,125 50,110 L50,140 Q90,125 130,125" fill="#f472b6" />
                    <circle cx="80" cy="70" r="18" fill="#22c55e" />
                    <circle cx="80" cy="70" r="9" fill="white" />
                    <circle cx="85" cy="70" r="4" fill="black" />
                </svg>
            `,
            EQUAL: `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" class="w-full h-full">
                    <path d="M50,140 Q100,160 150,140 Q150,100 100,100 Q50,100 50,140" fill="#22c55e" />
                    <path d="M60,125 Q100,125 140,125" stroke="#166534" stroke-width="12" stroke-linecap="round" />
                    <path d="M80,125 L85,115 L90,125 L95,115" fill="none" stroke="white" stroke-width="3" />
                    <circle cx="70" cy="90" r="20" fill="#22c55e" />
                    <circle cx="130" cy="90" r="20" fill="#22c55e" />
                    <circle cx="70" cy="90" r="10" fill="white" />
                    <circle cx="130" cy="90" r="10" fill="white" />
                    <circle cx="70" cy="90" r="4" fill="black" />
                    <circle cx="130" cy="90" r="4" fill="black" />
                </svg>
            `
        };

        function updateCroc(state) {
            const container = document.getElementById('croc-svg-container');
            container.innerHTML = SVGS[state];
        }

        function generateNumbers() {
            let max = level * 10 + 5;
            num1 = Math.floor(Math.random() * max);

            if (Math.random() < 0.2) {
                num2 = num1;
            } else {
                num2 = Math.floor(Math.random() * max);
            }

            document.getElementById('num-left').textContent = num1;
            document.getElementById('num-right').textContent = num2;

            updateCroc('IDLE');
            canPlay = true;
        }

        function playSound(type) {
            if (Tone.context.state !== 'running') Tone.start();
            if (type === 'correct') {
                synth.triggerAttackRelease(["C4", "E4", "G4"], "8n");
            } else if (type === 'wrong') {
                synth.triggerAttackRelease("G2", "4n");
            }
        }

        function checkAnswer(choice) {
            if (!canPlay) return;
            canPlay = false;

            let correct;
            if (num1 > num2) correct = '>';
            else if (num1 < num2) correct = '<';
            else correct = '=';

            if (choice === correct) {
                score += 10;
                document.getElementById('score').textContent = score;
                playSound('correct');
                
                if (window.parent && window.parent.EduQuest && typeof window.parent.EduQuest.submitScore === 'function') {
                    window.parent.EduQuest.submitScore(10);
                } else if (window.parent !== window) {
                    window.parent.postMessage({ type: 'gameScore', value: 10 }, '*');
                }

                if (choice === '>') updateCroc('GREATER');
                else if (choice === '<') updateCroc('LESS');
                else updateCroc('EQUAL');

                if (score >= 100) {
                    setTimeout(endGame, 800);
                } else {
                    setTimeout(generateNumbers, 1500);
                }
            } else {
                playSound('wrong');
                document.getElementById('croc-zone').classList.add('shake');
                
                lives--;
                
                if (window.parent && window.parent.EduQuest && typeof window.parent.EduQuest.loseLife === 'function') {
                    window.parent.EduQuest.loseLife();
                } else if (window.parent !== window) {
                    window.parent.postMessage({ type: 'gameLifeLost' }, '*');
                }

                if (lives <= 0) {
                    setTimeout(endGame, 1000);
                } else {
                    setTimeout(() => {
                        document.getElementById('croc-zone').classList.remove('shake');
                        generateNumbers(); // Generate a new question
                    }, 1000);
                }
            }
        }

        function endGame() {
            if (window.parent && window.parent.EduQuest && typeof window.parent.EduQuest.endGame === 'function') {
                window.parent.EduQuest.finalScore = score;
                window.parent.EduQuest.endGame();
            } else if (window.parent !== window) {
                window.parent.postMessage({ type: 'gameOver', score: score }, '*');
            }

            document.getElementById('new-level-val').parentElement.innerHTML = 'Level <span class="text-green-600">COMPLETED!</span>';
            document.querySelector('#modal-content button').textContent = 'FINISH!';
            const modal = document.getElementById('level-modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => content.style.transform = 'scale(1)', 50);
        }

        function closeModal() {
            const content = document.getElementById('modal-content');
            content.style.transform = 'scale(0)';
            setTimeout(() => {
                document.getElementById('level-modal').classList.add('hidden');
                generateNumbers();
            }, 500);
        }

        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'startGame') {
                // Game started
            }
        });

        window.onload = () => {
            // Generate numbers immediately so the crocodile appears on load
            generateNumbers();
        };
    </script>
</body>

</html>
