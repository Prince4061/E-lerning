<!DOCTYPE html>
<html lang="en">
<head>
    <script id="game-metadata" type="application/json">
    {
      "game_id": "math-placevalue-1",
      "title": "Balloon Pop",
      "subject": "math",
      "level": 1,
      "concept": "Place Values",
      "description": "Pop balloons to find the correct digit based on place value!",
      "instructions": "Pop the balloon with the digit that matches the requested place value (Ones, Tens, or Hundreds). You have 3 lives. Get 70% or more to pass!",
      "pass_threshold": 70,
      "min_age": 5
    }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balloon Math Shooter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            background: #87CEEB; /* Sky Blue */
            user-select: none;
            touch-action: manipulation;
        }
        .title-font {
            font-family: 'Fredoka One', cursive;
        }
        .balloon {
            position: absolute;
            cursor: crosshair;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
        }
        .balloon:active {
            transform: scale(0.9);
        }
        .pop-animation {
            animation: pop 0.3s ease-out forwards;
        }
        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            pointer-events: none;
            z-index: 0;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .game-canvas {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 100vh;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 100%);
        }
        .hud {
            text-shadow: 2px 2px 0px rgba(255,255,255,0.5);
        }
        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div id="app" class="game-canvas">
    <!-- Menu Screen -->
    <div id="menu" class="absolute inset-0 z-50 flex items-center justify-center p-4">
        <div class="glass max-w-md w-full p-8 text-center shadow-2xl">
            <h1 class="title-font text-5xl text-blue-600 mb-4 tracking-wider">Balloon Pop!</h1>
            <p class="text-xl text-blue-800 mb-8 font-bold">Master your Place Values (Ones, Tens, Hundreds)</p>
            <button onclick="startGame()" class="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 title-font text-2xl py-4 px-10 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95">
                START GAME 🎈
            </button>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud" class="hidden absolute top-0 left-0 w-full p-4 z-40 flex justify-between items-start pointer-events-none">
        <div class="hud flex flex-col gap-2">
            <div class="bg-white/80 px-4 py-2 rounded-full shadow-md text-blue-600 font-bold text-xl">
                Score: <span id="scoreVal">0</span>
            </div>
            <div class="bg-white/80 px-4 py-2 rounded-full shadow-md text-purple-600 font-bold text-xl">
                Level: <span id="levelVal">1</span>
            </div>
        </div>
        
        <div class="flex-1 flex justify-center px-4">
            <div class="glass px-8 py-4 text-center pointer-events-auto">
                <div id="questionText" class="text-2xl font-bold text-gray-800 mb-1">...</div>
                <div id="targetNumber" class="title-font text-5xl text-blue-600">000</div>
            </div>
        </div>

        <div class="hud text-right">
            <div id="timerBox" class="bg-white/80 px-4 py-2 rounded-full shadow-md text-red-600 font-bold text-2xl w-24 text-center">
                <span id="timerVal">60</span>s
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover" class="hidden absolute inset-0 z-50 flex items-center justify-center p-4">
        <div class="glass max-w-md w-full p-8 text-center shadow-2xl">
            <h2 class="title-font text-4xl text-red-600 mb-4">Time's Up!</h2>
            <div class="text-6xl mb-4">🏆</div>
            <p class="text-2xl text-blue-800 mb-2">Final Score</p>
            <p id="finalScore" class="title-font text-6xl text-blue-600 mb-8">0</p>
            <button onclick="startGame()" class="bg-blue-500 hover:bg-blue-600 text-white title-font text-2xl py-4 px-10 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95">
                PLAY AGAIN
            </button>
        </div>
    </div>

    <!-- Feedback Message -->
    <div id="feedback" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none text-5xl title-font z-50 opacity-0 transition-all duration-300">
        CORRECT!
    </div>

    <!-- Layers for dynamic elements -->
    <div id="clouds-layer" class="absolute inset-0 pointer-events-none"></div>
    <div id="balloons-layer" class="absolute inset-0"></div>
</div>

<script>
    // --- Audio Synthesis ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        const now = audioCtx.currentTime;

        if (type === 'pop') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(10, now + 0.1);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'correct') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(523.25, now); // C5
            osc.frequency.exponentialRampToValueAtTime(1046.50, now + 0.2); // C6
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.linearRampToValueAtTime(50, now + 0.3);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        }
    }

    // --- Game Variables ---
    let gameState = 'menu';
    let score = 0;
    let level = 1;
    let timer = 60;
    let gameInterval;
    let currentTask = null;
    let balloons = [];
    let balloonIdCounter = 0;
    let lastLevelUpScore = 0;

    const balloonColors = [
        '#FF5252', '#FF4081', '#E040FB', '#7C4DFF', 
        '#536DFE', '#448AFF', '#40C4FF', '#18FFFF', 
        '#64FFDA', '#69F0AE', '#B2FF59', '#EEFF41', 
        '#FFFF00', '#FFD740', '#FFAB40', '#FF6E40'
    ];

    const placeValueNames = ['ones', 'tens', 'hundreds'];

    // --- UI Elements ---
    const menuEl = document.getElementById('menu');
    const hudEl = document.getElementById('hud');
    const gameoverEl = document.getElementById('gameover');
    const scoreValEl = document.getElementById('scoreVal');
    const levelValEl = document.getElementById('levelVal');
    const timerValEl = document.getElementById('timerVal');
    const questionTextEl = document.getElementById('questionText');
    const targetNumberEl = document.getElementById('targetNumber');
    const balloonsLayer = document.getElementById('balloons-layer');
    const cloudsLayer = document.getElementById('clouds-layer');
    const feedbackEl = document.getElementById('feedback');

    // --- Setup Background Clouds ---
    function initClouds() {
        cloudsLayer.innerHTML = '';
        for (let i = 0; i < 6; i++) {
            createCloud();
        }
    }

    function createCloud() {
        const cloud = document.createElement('div');
        cloud.className = 'cloud';
        const w = 100 + Math.random() * 100;
        const h = w * 0.4;
        cloud.style.width = w + 'px';
        cloud.style.height = h + 'px';
        cloud.style.left = (Math.random() * 120 - 10) + 'vw';
        cloud.style.top = (Math.random() * 80) + 'vh';
        
        // Add cloud puffs
        const before = document.createElement('div');
        before.style.width = (w*0.6) + 'px';
        before.style.height = (w*0.6) + 'px';
        before.style.top = -(w*0.3) + 'px';
        before.style.left = (w*0.1) + 'px';
        before.className = 'absolute bg-white rounded-full';
        
        const after = document.createElement('div');
        after.style.width = (w*0.5) + 'px';
        after.style.height = (w*0.5) + 'px';
        after.style.top = -(w*0.2) + 'px';
        after.style.left = (w*0.4) + 'px';
        after.className = 'absolute bg-white rounded-full';

        cloud.appendChild(before);
        cloud.appendChild(after);
        cloudsLayer.appendChild(cloud);

        // Slow drift
        let pos = parseFloat(cloud.style.left);
        const speed = 0.02 + Math.random() * 0.05;
        function drift() {
            if (gameState === 'playing' || gameState === 'menu') {
                pos += speed;
                if (pos > 110) pos = -20;
                cloud.style.left = pos + 'vw';
            }
            requestAnimationFrame(drift);
        }
        drift();
    }

    // --- Game Logic ---
    function startGame() {
        gameState = 'playing';
        score = 0;
        level = 1;
        timer = 60;
        balloons = [];
        balloonsLayer.innerHTML = '';
        
        menuEl.classList.add('hidden');
        gameoverEl.classList.add('hidden');
        hudEl.classList.remove('hidden');
        
        updateHUD();
        nextQuestion();
        
        if (gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(gameTick, 1000);

        spawnInitialBalloons();
        requestAnimationFrame(gameLoop);
    }

    function gameTick() {
        if (timer > 0) {
            timer--;
            updateHUD();
        } else {
            endGame();
        }
    }

    function updateHUD() {
        scoreValEl.innerText = score;
        levelValEl.innerText = level;
        timerValEl.innerText = timer;
    }

    function nextQuestion() {
        // Generate number based on level
        let num;
        let placeIdx;

        if (level === 1) {
            num = Math.floor(10 + Math.random() * 90); // 2-digit
            placeIdx = Math.floor(Math.random() * 2); 
        } else {
            num = Math.floor(100 + Math.random() * 900); // 3-digit
            placeIdx = Math.floor(Math.random() * 3);
        }

        const placeNamesDisplay = ['Ones', 'Tens', 'Hundreds'];
        const placeName = placeNamesDisplay[placeIdx];
        const numStr = num.toString().padStart(3, '0');
        const targetDigit = numStr[numStr.length - 1 - placeIdx];

        currentTask = {
            number: num,
            placeName: placeName,
            targetDigit: targetDigit
        };

        questionTextEl.innerText = `Shoot the ${placeName} digit in:`;
        targetNumberEl.innerText = num;
        
        // Clear logic to ensure the correct digit balloon exists
        ensureTargetExists(targetDigit);
    }

    function ensureTargetExists(digit) {
        const exists = balloons.some(b => b.value === digit && !b.popping);
        if (!exists) {
            createBalloon(digit);
        }
    }

    function spawnInitialBalloons() {
        for (let i = 0; i < 6; i++) {
            createBalloon();
        }
    }

    function createBalloon(forcedValue = null) {
        const id = balloonIdCounter++;
        const value = forcedValue !== null ? forcedValue : Math.floor(Math.random() * 10).toString();
        const color = balloonColors[Math.floor(Math.random() * balloonColors.length)];
        
        const el = document.createElement('div');
        el.className = 'balloon';
        el.id = `bal-${id}`;
        
        const size = 80 + Math.random() * 40;
        el.style.width = size + 'px';
        el.style.height = (size * 1.2) + 'px';

        el.innerHTML = `
            <svg viewBox="0 0 100 120" width="100%" height="100%">
                <defs>
                    <radialGradient id="grad-${id}" cx="40%" cy="40%" r="50%">
                        <stop offset="0%" style="stop-color:white; stop-opacity:0.4" />
                        <stop offset="100%" style="stop-color:${color}; stop-opacity:0" />
                    </radialGradient>
                </defs>
                <path d="M50,10 C20,10 5,35 5,60 C5,85 20,105 50,115 C80,105 95,85 95,60 C95,35 80,10 50,10 Z" fill="${color}" />
                <path d="M50,10 C20,10 5,35 5,60 C5,85 20,105 50,115 C80,105 95,85 95,60 C95,35 80,10 50,10 Z" fill="url(#grad-${id})" />
                <!-- String -->
                <path d="M50,115 Q45,125 50,135" stroke="#555" fill="none" stroke-width="2" />
                <text x="50" y="70" text-anchor="middle" font-family="'Fredoka One'" font-size="40" fill="white" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.3)">${value}</text>
            </svg>
        `;

        el.addEventListener('mousedown', (e) => handlePop(id, e));
        el.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handlePop(id, e);
        });

        balloonsLayer.appendChild(el);

        const balloonObj = {
            id,
            el,
            value,
            x: Math.random() * (window.innerWidth - size),
            y: window.innerHeight + 100,
            vx: (Math.random() - 0.5) * 2,
            vy: -(1.5 + Math.random() * (1 + level * 0.5)),
            size,
            popping: false
        };

        balloons.push(balloonObj);
    }

    function handlePop(id, event) {
        if (gameState !== 'playing') return;
        
        const b = balloons.find(x => x.id === id);
        if (!b || b.popping) return;

        b.popping = true;
        playSound('pop');
        b.el.classList.add('pop-animation');

        if (b.value === currentTask.targetDigit) {
            // Correct!
            score += 10;
            showFeedback('EXCELLENT!', 'text-green-500');
            playSound('correct');
            
            // Check for level up
            if (score >= lastLevelUpScore + 50) {
                level++;
                lastLevelUpScore = score;
                showFeedback('LEVEL UP!', 'text-yellow-500');
            }
            
            updateHUD();
            nextQuestion();
        } else {
            // Wrong digit
            score = Math.max(0, score - 5);
            showFeedback('TRY AGAIN!', 'text-red-500');
            playSound('wrong');
            updateHUD();
        }

        setTimeout(() => {
            b.el.remove();
            balloons = balloons.filter(x => x.id !== id);
        }, 300);
    }

    function showFeedback(text, colorClass) {
        feedbackEl.innerText = text;
        feedbackEl.className = `absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none text-6xl title-font z-50 transition-all duration-300 ${colorClass} opacity-100 scale-125`;
        
        setTimeout(() => {
            feedbackEl.classList.replace('opacity-100', 'opacity-0');
            feedbackEl.classList.remove('scale-125');
        }, 600);
    }

    function gameLoop() {
        if (gameState !== 'playing') return;

        balloons.forEach(b => {
            if (b.popping) return;

            b.x += b.vx;
            b.y += b.vy;

            // Bounce off walls
            if (b.x <= 0 || b.x >= window.innerWidth - b.size) {
                b.vx *= -1;
            }

            b.el.style.transform = `translate(${b.x}px, ${b.y}px)`;

            // Recycle if gone off top
            if (b.y < -200) {
                b.el.remove();
                balloons = balloons.filter(x => x.id !== b.id);
            }
        });

        // Keep balloon count up
        if (balloons.length < 5 + level) {
            createBalloon();
        }

        requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameState = 'gameover';
        if (gameInterval) clearInterval(gameInterval);
        hudEl.classList.add('hidden');
        gameoverEl.classList.remove('hidden');
        document.getElementById('finalScore').innerText = score;
        balloonsLayer.innerHTML = '';
        balloons = [];

        // Send game over message to parent (EduQuest)
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'gameOver', score: score }, '*');
        }
    }

    // Auto-start when loaded in EduQuest (for hub integration)
    function math_placevalue_1_init() {
        startGame();
    }

    // Listen for start message from parent
    window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'startGame') {
            startGame();
        }
    });

    // Notify parent that game is ready
    window.addEventListener('load', () => {
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'gameReady' }, '*');
        }
    });

    // Initialize environment
    initClouds();

    // Handle window resize
    window.addEventListener('resize', () => {
        // Just clear balloons if screen changes too much to avoid glitches
        balloons.forEach(b => b.el.remove());
        balloons = [];
    });

</script>
</body>
</html>
