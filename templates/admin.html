<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - EduQuest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .admin-page {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 800px;
      overflow: hidden;
    }
    .admin-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .admin-header h1 {
      margin: 0;
      font-family: 'Fredoka One', cursive;
    }
    .back-link {
      color: white;
      text-decoration: none;
      font-weight: 600;
    }
    .admin-content {
      padding: 30px;
    }
    .login-form {
      max-width: 300px;
      margin: 0 auto;
      text-align: center;
    }
    .login-form h2 {
      color: #333;
      margin-bottom: 20px;
    }
    .form-input {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }
    .form-input:focus {
      border-color: #667eea;
      outline: none;
    }
    .btn-admin {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .btn-admin:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    .error-msg {
      color: #e74c3c;
      margin-top: 10px;
      display: none;
    }
    .admin-panel {
      display: none;
    }
    .stats-row {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      flex: 1;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }
    .stat-card .number {
      font-family: 'Fredoka One', cursive;
      font-size: 36px;
      color: #667eea;
    }
    .stat-card .label {
      color: #666;
      font-size: 14px;
    }
    .search-box {
      margin-bottom: 20px;
    }
    .search-box input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .users-list {
      max-height: 400px;
      overflow-y: auto;
    }
    .user-card {
      display: flex;
      align-items: center;
      padding: 15px;
      border-bottom: 1px solid #e0e0e0;
    }
    .user-card:hover {
      background: #f5f7fa;
    }
    .user-info {
      flex: 1;
    }
    .user-name {
      font-weight: 700;
      color: #333;
    }
    .user-mobile {
      font-size: 12px;
      color: #666;
    }
    .user-stats {
      text-align: center;
      padding: 0 20px;
    }
    .user-score {
      font-family: 'Fredoka One', cursive;
      color: #667eea;
    }
    .user-games {
      font-size: 12px;
      color: #666;
    }
    .user-status {
      margin-right: 15px;
    }
    .badge-premium {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #000;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-free {
      background: #e0e0e0;
      color: #666;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
    }
    .btn-toggle {
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      font-weight: 600;
      font-size: 12px;
    }
    .btn-make-premium {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #000;
    }
    .btn-remove-premium {
      background: #e0e0e0;
      color: #666;
    }
    .logout-btn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    .no-users {
      text-align: center;
      padding: 40px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="admin-page">
    <div class="admin-header">
      <h1>⚙️ Admin Panel</h1>
      <div>
        <a href="/" class="back-link">← Back to App</a>
      </div>
    </div>

    <div class="admin-content">
      <!-- Login Form -->
      <div class="login-form" id="login-form">
        <h2>Admin Login</h2>
        <input type="password" id="admin-pin" class="form-input" placeholder="Enter Admin PIN">
        <button class="btn-admin" onclick="adminLogin()">Login</button>
        <p class="error-msg" id="login-error">Invalid PIN</p>
        <p style="color: #999; margin-top: 20px; font-size: 12px;">Default PIN: admin123</p>
      </div>

      <!-- Admin Panel -->
      <div class="admin-panel" id="admin-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h2 style="margin: 0;">Users Management</h2>
          <button class="logout-btn" onclick="adminLogout()">Logout</button>
        </div>

        <div class="stats-row">
          <div class="stat-card">
            <div class="number" id="total-users">0</div>
            <div class="label">Total Users</div>
          </div>
          <div class="stat-card">
            <div class="number" id="premium-users">0</div>
            <div class="label">Premium</div>
          </div>
          <div class="stat-card">
            <div class="number" id="total-games">0</div>
            <div class="label">Games Played</div>
          </div>
        </div>

        <div class="search-box">
          <input type="text" id="search-input" placeholder="Search by name or mobile..." onkeyup="filterUsers()">
        </div>

        <div class="users-list" id="users-list">
          <div class="loading">Loading...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allUsers = [];

    async function adminLogin() {
      const pin = document.getElementById('admin-pin').value;
      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin })
        });
        const data = await response.json();
        if (data.success) {
          document.getElementById('login-form').style.display = 'none';
          document.getElementById('admin-panel').style.display = 'block';
          loadUsers();
        } else {
          document.getElementById('login-error').style.display = 'block';
        }
      } catch (e) {
        document.getElementById('login-error').style.display = 'block';
      }
    }

    function adminLogout() {
      document.getElementById('login-form').style.display = 'block';
      document.getElementById('admin-panel').style.display = 'none';
      document.getElementById('admin-pin').value = '';
    }

    async function loadUsers() {
      try {
        const response = await fetch('/api/admin/users');
        const users = await response.json();
        allUsers = users;

        document.getElementById('total-users').textContent = users.length;
        document.getElementById('premium-users').textContent = users.filter(u => u.is_premium).length;
        document.getElementById('total-games').textContent = users.reduce((sum, u) => sum + u.completed_games, 0);

        renderUsers(users);
      } catch (e) {
        document.getElementById('users-list').innerHTML = '<div class="no-users">Error loading users</div>';
      }
    }

    function renderUsers(users) {
      const list = document.getElementById('users-list');
      if (users.length === 0) {
        list.innerHTML = '<div class="no-users">No users found</div>';
        return;
      }

      list.innerHTML = users.map(user => `
        <div class="user-card">
          <div class="user-info">
            <div class="user-name">${user.name}</div>
            <div class="user-mobile">${user.mobile}</div>
          </div>
          <div class="user-stats">
            <div class="user-score">${user.total_score}</div>
            <div class="user-games">${user.completed_games} games</div>
          </div>
          <div class="user-status">
            ${user.is_premium ? '<span class="badge-premium">👑 Premium</span>' : '<span class="badge-free">Free</span>'}
          </div>
          <button class="btn-toggle ${user.is_premium ? 'btn-remove-premium' : 'btn-make-premium'}"
                  onclick="togglePremium(${user.id}, ${!user.is_premium})">
            ${user.is_premium ? 'Remove' : 'Make Premium'}
          </button>
        </div>
      `).join('');
    }

    function filterUsers() {
      const query = document.getElementById('search-input').value.toLowerCase();
      const filtered = allUsers.filter(user =>
        user.name.toLowerCase().includes(query) ||
        user.mobile.includes(query)
      );
      renderUsers(filtered);
    }

    async function togglePremium(userId, makePremium) {
      try {
        await fetch(`/api/admin/user/${userId}/premium`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ is_premium: makePremium })
        });
        loadUsers();
      } catch (e) {
        alert('Error updating user');
      }
    }

    // Allow Enter key to submit
    document.getElementById('admin-pin').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') adminLogin();
    });
  </script>
</body>
</html>
